<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:1080px;height:1920px;overflow:hidden;
        background:#2a1822;font-family:"Space Grotesk",system-ui,sans-serif;color:#f9e6ea}
      .scene{position:absolute;inset:0;overflow:hidden}
      .grain{position:absolute;inset:0;pointer-events:none;opacity:0.14;mix-blend-mode:overlay;z-index:60;
        background:radial-gradient(ellipse at 30% 20%,rgba(255,210,220,0.6),transparent 45%),
                   radial-gradient(ellipse at 70% 80%,rgba(180,40,70,0.35),transparent 55%)}
      #stage{background:radial-gradient(ellipse at 50% 35%,#4a1c30 0%,#2a1822 70%)}

      .petal{position:absolute;width:52px;height:68px;
        background:radial-gradient(ellipse at 40% 30%,#ffb5c2,#d24068 80%);
        border-radius:60% 10% 60% 10%;opacity:0;z-index:45;
        filter:drop-shadow(0 4px 8px rgba(120,20,40,0.5))}

      .env-wrap{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);
        width:800px;height:520px;perspective:1800px;z-index:20}
      .env-back{position:absolute;inset:0;border-radius:8px;
        background:linear-gradient(180deg,#3a1220,#1f0812);box-shadow:inset 0 20px 40px rgba(0,0,0,0.6);z-index:10}
      .site{position:absolute;left:50%;top:0;width:720px;height:1080px;transform:translate(-50%,50%);
        background:#2a1822;border-radius:22px;overflow:hidden;z-index:15;opacity:0;
        box-shadow:0 40px 120px rgba(120,20,50,0.55),0 0 0 1px rgba(255,140,160,0.2)}
      .site video{width:100%;height:100%;object-fit:cover}
      .site .site-top{position:absolute;top:0;left:0;right:0;height:120px;
        background:linear-gradient(180deg,rgba(42,24,34,0.88),rgba(42,24,34,0));
        display:flex;align-items:center;padding:0 40px;z-index:3}
      .site .site-top .logo{width:56px;height:56px;border-radius:999px;background:#f9e6ea;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-right:20px}
      .site .site-top .logo img{width:44px;height:44px;object-fit:contain}
      .site .site-top .brand{font-family:"Orbitron",sans-serif;font-size:26px;font-weight:800;letter-spacing:0.3em;color:#f9e6ea;text-transform:uppercase}
      .site .site-btm{position:absolute;bottom:0;left:0;right:0;padding:40px;
        background:linear-gradient(0deg,rgba(42,24,34,0.92),rgba(42,24,34,0));
        display:flex;justify-content:space-between;align-items:flex-end;z-index:3}
      .site .site-btm .title{font-family:"Merienda",cursive;font-size:78px;line-height:0.95;color:#f9e6ea;max-width:420px}
      .site .site-btm .go{background:#ff8aa5;color:#2a1822;padding:18px 30px;border-top-left-radius:16px;
        font-family:"Orbitron",sans-serif;font-weight:800;font-size:22px;letter-spacing:0.25em;text-transform:uppercase}

      .env-front{position:absolute;inset:0;border-radius:8px;z-index:30;
        background:linear-gradient(135deg,#f7dde2,#e8b8c2 100%);
        box-shadow:0 40px 80px rgba(80,20,40,0.5),inset 0 0 0 2px rgba(180,80,110,0.35);
        clip-path:polygon(0 42%,100% 42%,100% 100%,0 100%)}
      .env-front::after{content:"";position:absolute;left:6%;right:6%;top:50%;bottom:8%;
        border:1px dashed rgba(180,80,110,0.45);border-radius:4px}
      .env-flap{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#e8b8c2,#d99ba8);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;z-index:40;
        box-shadow:0 10px 20px rgba(80,20,40,0.3)}
      .env-flap-underside{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#3a1220,#1f0812);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;
        transform:rotateX(180deg);backface-visibility:hidden;z-index:39}

      /* Wax seal splits in half */
      .seal-l,.seal-r{position:absolute;top:44%;width:52px;height:104px;overflow:hidden;z-index:45;
        filter:drop-shadow(0 8px 18px rgba(80,10,30,0.55))}
      .seal-l{left:calc(50% - 52px);transform:translateY(-50%)}
      .seal-r{left:50%;transform:translateY(-50%)}
      .seal-l::before,.seal-r::before{content:"";position:absolute;top:0;width:104px;height:104px;border-radius:50%;
        background:radial-gradient(circle at 35% 35%,#ff7090,#a02040 70%);
        box-shadow:inset 0 0 25px rgba(80,10,30,0.6)}
      .seal-l::before{left:0}
      .seal-r::before{right:0}
      .seal-letter{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
        font-family:"Orbitron",sans-serif;font-size:44px;color:#2a1020;font-weight:800;z-index:46}

      #cta-wrap{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,#4a1c30,#2a1822 70%);
        opacity:0;z-index:80;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:200px 80px;text-align:center}
      #cta-logo{width:160px;height:160px;border-radius:999px;background:#f9e6ea;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:60px}
      #cta-logo img{width:128px;height:128px;object-fit:contain}
      #cta-brand{font-family:"Orbitron",sans-serif;font-size:80px;font-weight:800;letter-spacing:0.25em;color:#f9e6ea;text-transform:uppercase;margin-bottom:40px}
      #cta-url{font-family:"Orbitron",sans-serif;font-size:42px;font-weight:700;letter-spacing:0.3em;color:#ff8aa5;text-transform:lowercase}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1080" data-height="1920">

      <div id="stage" class="scene">
        <div class="petal" id="p1" style="left:10%;top:-80px"></div>
        <div class="petal" id="p2" style="left:82%;top:-80px"></div>
        <div class="petal" id="p3" style="left:30%;top:-80px"></div>
        <div class="petal" id="p4" style="left:62%;top:-80px"></div>
        <div class="petal" id="p5" style="left:46%;top:-80px"></div>
        <div class="petal" id="p6" style="left:18%;top:-80px"></div>
        <div class="petal" id="p7" style="left:88%;top:-80px"></div>

        <div class="env-wrap" id="env">
          <div class="env-back"></div>
          <div class="site" id="site">
            <video src="assets/rose.mp4" muted playsinline></video>
            <div class="site-top">
              <span class="logo"><img src="assets/logo.png" alt="" /></span>
              <span class="brand">Uygundavet</span>
            </div>
            <div class="site-btm">
              <div class="title">Aşkın<br>sahnesi.</div>
              <div class="go">uygundavet.com</div>
            </div>
          </div>
          <div class="env-front"></div>
          <div class="env-flap-underside"></div>
          <div class="env-flap" id="flap"></div>
          <div class="seal-l" id="seal-l"></div>
          <div class="seal-r" id="seal-r"></div>
          <div class="seal-letter" id="seal-letter">U</div>
        </div>
        <div class="grain"></div>
      </div>

      <div id="cta-wrap">
        <div id="cta-logo"><img src="assets/logo.png" alt="" /></div>
        <div id="cta-brand">Uygundavet</div>
        <div id="cta-url">uygundavet.com</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#stage", { opacity: 0, duration: 0.4, ease: "power2.out" }, 0.05);
      tl.from("#env", { y: -120, scale: 0.85, opacity: 0, rotationZ: -4, duration: 1.0, ease: "power3.out" }, 0.4);
      tl.from(["#seal-l","#seal-r","#seal-letter"], { scale: 0, rotation: -60, duration: 0.6, ease: "back.out(2.2)", stagger: 0.05 }, 1.05);

      tl.to(["#seal-l","#seal-r","#seal-letter"], { scale: 1.08, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.9);

      /* Seal cracks — halves fly apart, letter drops */
      tl.to("#seal-l", { x: -160, rotation: -22, opacity: 0, duration: 0.5, ease: "power3.in" }, 3.9);
      tl.to("#seal-r", { x: 160, rotation: 22, opacity: 0, duration: 0.5, ease: "power3.in" }, 3.9);
      tl.to("#seal-letter", { y: 80, opacity: 0, rotation: 25, duration: 0.5, ease: "power2.in" }, 3.95);

      tl.to("#flap", { rotationX: -170, duration: 1.0, ease: "power3.inOut" }, 4.2);

      /* Petals fall from top after crack */
      ["#p1","#p2","#p3","#p4","#p5","#p6","#p7"].forEach((p, i) => {
        tl.fromTo(p, { y: 0, rotation: 0, opacity: 0 },
          { y: 2100, rotation: 540, opacity: 0.95, duration: 6, ease: "sine.inOut" }, 3.9 + i*0.25);
      });

      tl.to("#site", { opacity: 1, duration: 0.01 }, 5.0);
      tl.to("#site", { y: -560, scale: 1.08, duration: 1.4, ease: "power3.out" }, 5.0);
      tl.to("#site", { y: -640, scale: 1.18, duration: 1.4, ease: "sine.inOut" }, 6.5);

      tl.to([".env-back",".env-front","#flap",".env-flap-underside"], { opacity: 0.2, duration: 0.7, ease: "sine.out" }, 6.6);

      tl.to("#cta-wrap", { opacity: 1, duration: 0.6, ease: "power2.out" }, 9.2);
      tl.from("#cta-logo", { scale: 0, duration: 0.65, ease: "back.out(2)" }, 9.4);
      tl.from("#cta-brand", { y: 30, opacity: 0, duration: 0.65, ease: "power3.out" }, 9.7);
      tl.from("#cta-url", { y: 16, opacity: 0, duration: 0.55, ease: "sine.out" }, 10.0);
      tl.to("#cta-logo", { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.4);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
