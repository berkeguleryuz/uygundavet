<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:1080px;height:1920px;overflow:hidden;
        background:#1a1718;font-family:"Space Grotesk",system-ui,sans-serif;color:#f5f6f3}
      .scene{position:absolute;inset:0;overflow:hidden}
      .grain{position:absolute;inset:0;pointer-events:none;opacity:0.12;mix-blend-mode:overlay;z-index:60;
        background:radial-gradient(ellipse at 50% 40%,rgba(213,209,173,0.45),transparent 55%)}
      #stage{background:radial-gradient(ellipse at 50% 40%,#302a2d 0%,#1a1718 75%)}

      .env-wrap{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);
        width:800px;height:520px;perspective:1800px;z-index:20}
      .env-back{position:absolute;inset:0;border-radius:8px;
        background:linear-gradient(180deg,#2a2426,#12100f);box-shadow:inset 0 20px 40px rgba(0,0,0,0.7);z-index:10}

      /* Site content holds a stack of themed backgrounds */
      .site{position:absolute;left:50%;top:0;width:720px;height:1080px;transform:translate(-50%,50%);
        background:#1a1718;border-radius:22px;overflow:hidden;z-index:15;opacity:0;
        box-shadow:0 40px 120px rgba(0,0,0,0.7),0 0 0 1px rgba(213,209,173,0.25)}
      .theme-bg{position:absolute;inset:0;opacity:0}
      .theme-bg video,.theme-bg img{width:100%;height:100%;object-fit:cover}
      .site .site-top{position:absolute;top:0;left:0;right:0;height:120px;
        background:linear-gradient(180deg,rgba(26,23,24,0.92),rgba(26,23,24,0));
        display:flex;align-items:center;padding:0 40px;z-index:3}
      .site .site-top .logo{width:56px;height:56px;border-radius:999px;background:#d5d1ad;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-right:20px}
      .site .site-top .logo img{width:44px;height:44px;object-fit:contain}
      .site .site-top .brand{font-family:"Orbitron",sans-serif;font-size:26px;font-weight:800;letter-spacing:0.3em;color:#f5f6f3;text-transform:uppercase}
      .site .site-btm{position:absolute;bottom:0;left:0;right:0;padding:40px;
        background:linear-gradient(0deg,rgba(26,23,24,0.92),rgba(26,23,24,0));
        display:flex;justify-content:space-between;align-items:flex-end;z-index:3}
      .site .site-btm .title{font-family:"Merienda",cursive;font-size:78px;line-height:0.95;color:#f5f6f3;max-width:420px}
      .site .site-btm .go{background:#d5d1ad;color:#1a1718;padding:18px 30px;border-top-left-radius:16px;
        font-family:"Orbitron",sans-serif;font-weight:800;font-size:22px;letter-spacing:0.25em;text-transform:uppercase}

      .env-front{position:absolute;inset:0;border-radius:8px;z-index:30;
        background:linear-gradient(135deg,#2a2426,#12100f);
        box-shadow:0 40px 100px rgba(0,0,0,0.65),inset 0 0 0 2px rgba(213,209,173,0.5);
        clip-path:polygon(0 42%,100% 42%,100% 100%,0 100%)}
      .env-front::after{content:"";position:absolute;left:6%;right:6%;top:50%;bottom:8%;
        border:1.5px solid rgba(213,209,173,0.45);border-radius:4px}
      .env-flap{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#3a3235,#16141a);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;z-index:40}
      .env-flap-underside{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#d5d1ad,#8c8870);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;
        transform:rotateX(180deg);backface-visibility:hidden;z-index:39}
      .seal{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
        width:104px;height:104px;border-radius:50%;
        background:radial-gradient(circle at 35% 35%,#f5ecc8,#a89560 70%);
        box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:45;
        display:flex;align-items:center;justify-content:center;
        font-family:"Orbitron",sans-serif;font-size:44px;color:#1a1718;font-weight:800}

      #cta-wrap{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#302a2d,#1a1718 75%);
        opacity:0;z-index:80;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:200px 80px;text-align:center}
      #cta-logo{width:160px;height:160px;border-radius:999px;background:#d5d1ad;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:60px}
      #cta-logo img{width:128px;height:128px;object-fit:contain}
      #cta-brand{font-family:"Orbitron",sans-serif;font-size:80px;font-weight:800;letter-spacing:0.25em;color:#f5f6f3;text-transform:uppercase;margin-bottom:40px}
      #cta-url{font-family:"Orbitron",sans-serif;font-size:42px;font-weight:700;letter-spacing:0.3em;color:#d5d1ad;text-transform:lowercase}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1080" data-height="1920">

      <div id="stage" class="scene">
        <div class="env-wrap" id="env">
          <div class="env-back"></div>
          <div class="site" id="site">
            <div class="theme-bg" id="tb1"><img src="assets/grow.png" alt="" /></div>
            <div class="theme-bg" id="tb2"><video src="assets/pearl.mp4" muted playsinline></video></div>
            <div class="theme-bg" id="tb3"><video src="assets/rose.mp4" muted playsinline></video></div>
            <div class="theme-bg" id="tb4"><video src="assets/sunset.mp4" muted playsinline></video></div>
            <div class="theme-bg" id="tb5"><img src="assets/crystal.png" alt="" /></div>
            <div class="theme-bg" id="tb6"><video src="assets/garden.mp4" muted playsinline></video></div>
            <div class="theme-bg" id="tb7"><video src="assets/ocean.mp4" muted playsinline></video></div>
            <div class="theme-bg" id="tb8"><video src="assets/golden.mp4" muted playsinline></video></div>

            <div class="site-top">
              <span class="logo"><img src="assets/logo.png" alt="" /></span>
              <span class="brand">Uygundavet</span>
            </div>
            <div class="site-btm">
              <div class="title">8 tema,<br>tek yer.</div>
              <div class="go">uygundavet.com</div>
            </div>
          </div>
          <div class="env-front"></div>
          <div class="env-flap-underside"></div>
          <div class="env-flap" id="flap"></div>
          <div class="seal" id="seal">U</div>
        </div>
        <div class="grain"></div>
      </div>

      <div id="cta-wrap">
        <div id="cta-logo"><img src="assets/logo.png" alt="" /></div>
        <div id="cta-brand">Uygundavet</div>
        <div id="cta-url">uygundavet.com</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#stage", { opacity: 0, duration: 0.4, ease: "power2.out" }, 0.05);
      tl.from("#env", { scale: 0.7, opacity: 0, duration: 1.0, ease: "back.out(1.6)" }, 0.4);
      tl.from("#seal", { scale: 0, rotation: -180, duration: 0.6, ease: "back.out(2.2)" }, 1.1);

      tl.to("#seal", { scale: 1.1, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.9);
      tl.to("#seal", { scale: 0, y: 20, opacity: 0, duration: 0.4, ease: "back.in(2)" }, 3.9);

      tl.to("#flap", { rotationX: -170, duration: 1.0, ease: "power3.inOut" }, 4.2);

      tl.to("#site", { opacity: 1, duration: 0.01 }, 5.0);
      tl.to("#site", { y: -560, scale: 1.08, duration: 1.4, ease: "power3.out" }, 5.0);

      /* Theme cycle inside the site card: 0.4s each */
      const themes = ["#tb1","#tb2","#tb3","#tb4","#tb5","#tb6","#tb7","#tb8"];
      const startT = 5.4;
      const per = 0.45;
      themes.forEach((t, i) => {
        tl.to(t, { opacity: 1, duration: 0.15, ease: "power2.out" }, startT + i*per);
        if (i < themes.length - 1) {
          tl.to(t, { opacity: 0, duration: 0.2, ease: "power2.in" }, startT + i*per + per - 0.1);
        }
      });

      tl.to("#site", { y: -640, scale: 1.18, duration: 1.4, ease: "sine.inOut" }, 6.5);
      tl.to([".env-back",".env-front","#flap",".env-flap-underside"], { opacity: 0.18, duration: 0.7, ease: "sine.out" }, 6.6);

      tl.to("#cta-wrap", { opacity: 1, duration: 0.6, ease: "power2.out" }, 9.3);
      tl.from("#cta-logo", { scale: 0, duration: 0.65, ease: "back.out(2)" }, 9.5);
      tl.from("#cta-brand", { y: 30, opacity: 0, duration: 0.65, ease: "power3.out" }, 9.8);
      tl.from("#cta-url", { y: 16, opacity: 0, duration: 0.55, ease: "sine.out" }, 10.1);
      tl.to("#cta-logo", { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
