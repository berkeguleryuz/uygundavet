<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #f5f6f3;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: #252224;
      }

      #root { position: absolute; inset: 0; }

      .clip { position: absolute; inset: 0; opacity: 0; }

      video.clip {
        width: 1080px;
        height: 1920px;
        object-fit: cover;
        object-position: center;
        display: block;
        background: #f5f6f3;
      }

      /* Intro card */
      .intro {
        background: #f5f6f3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
      }
      .intro-logo {
        width: 360px; height: 360px;
        object-fit: contain;
        filter: drop-shadow(0 24px 60px rgba(217, 138, 90, 0.32));
      }
      .intro-wordmark {
        font-family: "Orbitron", sans-serif;
        font-weight: 600;
        font-size: 64px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #252224;
      }

      /* Outro card — wedding invitation frame */
      .outro {
        background: #f5f6f3;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .outro-frame {
        position: relative;
        width: 940px;
        height: 1720px;
        background: #faf8f1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 120px 80px;
        border: 3px solid #c5a96a;
        text-align: center;
      }
      .outro-frame::before {
        content: "";
        position: absolute;
        inset: 18px;
        border: 1.5px solid #d5c894;
        pointer-events: none;
      }
      .frame-corner {
        position: absolute;
        font-family: "Merienda", "Times New Roman", serif;
        color: #c5a96a;
        font-size: 64px;
        line-height: 1;
        z-index: 2;
      }
      .frame-corner.tl { top: 38px; left: 50px; }
      .frame-corner.tr { top: 38px; right: 50px; transform: scaleX(-1); }
      .frame-corner.bl { bottom: 38px; left: 50px; transform: scaleY(-1); }
      .frame-corner.br { bottom: 38px; right: 50px; transform: scale(-1, -1); }
      .frame-divider {
        font-family: "Merienda", "Times New Roman", serif;
        font-size: 38px;
        color: #c5a96a;
        letter-spacing: 0.6em;
        line-height: 1;
        opacity: 0.85;
      }
      .outro-logo {
        width: 240px; height: 240px;
        object-fit: contain;
        filter: drop-shadow(0 18px 48px rgba(217, 138, 90, 0.28));
      }
      .outro-wordmark {
        width: 620px;
        object-fit: contain;
      }
      .outro-tag {
        font-family: "Merienda", cursive;
        font-weight: 500;
        font-size: 52px;
        line-height: 1.3;
        color: #555670;
        max-width: 760px;
      }
      .outro-cta {
        font-family: "Orbitron", sans-serif;
        font-weight: 700;
        font-size: 46px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #252224;
        background: #d5c894;
        padding: 22px 56px;
        border-radius: 999px;
        box-shadow: 0 6px 20px -8px rgba(197, 169, 106, 0.5);
      }

      /* Vignette/grain overlay (always on, decorative, not animated separately) */
      .grain {
        position: absolute; inset: 0;
        pointer-events: none;
        opacity: 0.06;
        mix-blend-mode: overlay;
        background:
          radial-gradient(ellipse at 12% 18%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 40%),
          radial-gradient(ellipse at 85% 78%, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 45%);
        z-index: 50;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="25"
      data-width="1080"
      data-height="1920"
    >
      <!-- Track 0: intro + outro cards -->
      <div id="intro" class="clip intro" data-start="0" data-duration="1.5" data-track-index="0">
        <img src="assets/logo/logo.png" alt="logo" class="intro-logo" />
        <div class="intro-wordmark">uygundavet</div>
      </div>

      <div id="outro" class="clip outro" data-start="21.5" data-duration="3.5" data-track-index="0">
        <div class="outro-frame">
          <span class="frame-corner tl">❦</span>
          <span class="frame-corner tr">❦</span>
          <span class="frame-corner bl">❦</span>
          <span class="frame-corner br">❦</span>
          <div class="frame-divider">✦ ⚜ ✦</div>
          <img src="assets/logo/logo.png" alt="logo" class="outro-logo" />
          <img src="assets/logo/uygundavet-wordmark.png" alt="Uygun Davet" class="outro-wordmark" />
          <div class="outro-tag">Düğününün davetiyesi<br/>5 dakikada hazır.</div>
          <div class="outro-cta">Hemen Dene</div>
          <div class="frame-divider">✦ ⚜ ✦</div>
        </div>
      </div>

      <!-- Track 1: scene clips -->
      <video id="v1" class="clip" src="assets/clips/v1.mp4" data-start="1.5" data-duration="2.5" data-track-index="1" muted playsinline preload="auto"></video>
      <video id="v2" class="clip" src="assets/clips/v2.mp4" data-start="4" data-duration="3" data-track-index="1" muted playsinline preload="auto"></video>
      <video id="v3" class="clip" src="assets/clips/v3.mp4" data-start="7" data-duration="5" data-track-index="1" muted playsinline preload="auto"></video>
      <video id="v4" class="clip" src="assets/clips/v4.mp4" data-start="12" data-duration="3.5" data-track-index="1" muted playsinline preload="auto"></video>
      <video id="v5" class="clip" src="assets/clips/v5.mp4" data-start="15.5" data-duration="2.5" data-track-index="1" muted playsinline preload="auto"></video>
      <video id="v6" class="clip" src="assets/clips/v6.mp4" data-start="18" data-duration="3.5" data-track-index="1" muted playsinline preload="auto"></video>

      <!-- Track 2: voiceover -->
      <audio id="vo" class="clip" src="assets/audio/voiceover.mp3" data-start="1.5" data-duration="20.53" data-track-index="2" preload="auto"></audio>

      <!-- Track 3: soft jazz bed (Bossa Antigua, Kevin MacLeod, CC-BY 4.0) -->
      <audio id="music" class="clip" src="assets/audio/jazz_bed.mp3" data-start="0" data-duration="25" data-track-index="3" preload="auto"></audio>


      <div class="grain"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Intro card flash
      tl.fromTo("#intro", { opacity: 0 }, { opacity: 1, duration: 0.25 }, 0);
      tl.to("#intro .intro-logo", { scale: 1.05, duration: 1.0, ease: "power2.out" }, 0.1);
      tl.to("#intro", { opacity: 0, duration: 0.25 }, 1.25);
      tl.set("#intro", { opacity: 0 }, 1.5);

      // Scene clips: hard-cut visibility, gentle inner zoom for life
      const clips = [
        { id: "#v1", start: 1.5,  dur: 2.5 },
        { id: "#v2", start: 4,    dur: 3   },
        { id: "#v3", start: 7,    dur: 5   },
        { id: "#v4", start: 12,   dur: 3.5 },
        { id: "#v5", start: 15.5, dur: 2.5 },
        { id: "#v6", start: 18,   dur: 3.5 },
      ];

      clips.forEach((c) => {
        tl.set(c.id, { opacity: 1, scale: 1.02 }, c.start);
        tl.to(c.id, { scale: 1.06, duration: c.dur, ease: "none" }, c.start);
        tl.to(c.id, { opacity: 0, duration: 0.0 }, c.start + c.dur);
      });

      // Outro card
      tl.fromTo("#outro", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 21.5);
      tl.from("#outro .outro-frame",    { scale: 0.92, opacity: 0, duration: 0.55, ease: "power2.out" }, 21.55);
      tl.from("#outro .frame-corner",   { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2)", stagger: 0.05 }, 21.85);
      tl.from("#outro .frame-divider",  { scaleX: 0, opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.05 }, 21.95);
      tl.from("#outro .outro-logo",     { scale: 0.85, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, 22.05);
      tl.from("#outro .outro-wordmark", { y: 20, opacity: 0, duration: 0.45, ease: "power2.out" }, 22.25);
      tl.from("#outro .outro-tag",      { y: 20, opacity: 0, duration: 0.45, ease: "power2.out" }, 22.45);
      tl.from("#outro .outro-cta",      { y: 20, opacity: 0, duration: 0.45, ease: "back.out(1.4)" }, 22.65);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
