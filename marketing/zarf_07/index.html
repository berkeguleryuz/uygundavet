<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:1080px;height:1920px;overflow:hidden;
        background:#07192e;font-family:"Space Grotesk",system-ui,sans-serif;color:#e3f0ff}
      .scene{position:absolute;inset:0;overflow:hidden}
      .grain{position:absolute;inset:0;pointer-events:none;opacity:0.14;mix-blend-mode:overlay;z-index:60;
        background:radial-gradient(ellipse at 30% 25%,rgba(160,210,255,0.55),transparent 50%),
                   radial-gradient(ellipse at 70% 85%,rgba(40,90,180,0.4),transparent 55%)}
      #stage{background:radial-gradient(ellipse at 50% 40%,#10314f 0%,#07192e 75%)}

      .ripple{position:absolute;left:50%;top:56%;width:220px;height:220px;margin-left:-110px;margin-top:-110px;
        border:3px solid rgba(130,180,230,0.6);border-radius:50%;z-index:16;opacity:0;pointer-events:none}

      .env-wrap{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);
        width:800px;height:520px;perspective:1800px;z-index:20}
      .env-back{position:absolute;inset:0;border-radius:8px;
        background:linear-gradient(180deg,#0e2642,#051425);box-shadow:inset 0 20px 40px rgba(0,0,0,0.7);z-index:10}
      .site{position:absolute;left:50%;top:0;width:720px;height:1080px;transform:translate(-50%,50%);
        background:#07192e;border-radius:22px;overflow:hidden;z-index:15;opacity:0;
        box-shadow:0 40px 120px rgba(5,25,60,0.7),0 0 0 1px rgba(130,180,230,0.25)}
      .site video{width:100%;height:100%;object-fit:cover}
      .site .site-top{position:absolute;top:0;left:0;right:0;height:120px;
        background:linear-gradient(180deg,rgba(7,25,46,0.88),rgba(7,25,46,0));
        display:flex;align-items:center;padding:0 40px;z-index:3}
      .site .site-top .logo{width:56px;height:56px;border-radius:999px;background:#e3f0ff;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-right:20px}
      .site .site-top .logo img{width:44px;height:44px;object-fit:contain}
      .site .site-top .brand{font-family:"Orbitron",sans-serif;font-size:26px;font-weight:800;letter-spacing:0.3em;color:#e3f0ff;text-transform:uppercase}
      .site .site-btm{position:absolute;bottom:0;left:0;right:0;padding:40px;
        background:linear-gradient(0deg,rgba(7,25,46,0.92),rgba(7,25,46,0));
        display:flex;justify-content:space-between;align-items:flex-end;z-index:3}
      .site .site-btm .title{font-family:"Merienda",cursive;font-size:78px;line-height:0.95;color:#e3f0ff;max-width:420px}
      .site .site-btm .go{background:#5eb5f0;color:#07192e;padding:18px 30px;border-top-left-radius:16px;
        font-family:"Orbitron",sans-serif;font-weight:800;font-size:22px;letter-spacing:0.25em;text-transform:uppercase}

      .env-front{position:absolute;inset:0;border-radius:8px;z-index:30;
        background:linear-gradient(135deg,#2a5f8c,#143356 100%);
        box-shadow:0 40px 100px rgba(5,25,50,0.7),inset 0 0 0 2px rgba(130,180,230,0.3);
        clip-path:polygon(0 42%,100% 42%,100% 100%,0 100%)}
      .env-front::after{content:"";position:absolute;left:6%;right:6%;top:50%;bottom:8%;
        border:1.5px solid rgba(130,180,230,0.4);border-radius:4px}
      .env-flap{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#1e4771,#0e2642);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;z-index:40;
        box-shadow:0 10px 24px rgba(0,10,25,0.55)}
      .env-flap-underside{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#7ab0e0,#3878b4);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;
        transform:rotateX(180deg);backface-visibility:hidden;z-index:39}
      .seal{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
        width:104px;height:104px;border-radius:50%;
        background:radial-gradient(circle at 35% 30%,#ffffff,#a0c8e8 55%,#5080b0 100%);
        box-shadow:0 10px 28px rgba(0,20,50,0.55),inset 0 0 25px rgba(30,50,100,0.35);z-index:45;
        display:flex;align-items:center;justify-content:center;
        font-family:"Orbitron",sans-serif;font-size:44px;color:#07192e;font-weight:800}

      #cta-wrap{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#10314f,#07192e 75%);
        opacity:0;z-index:80;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:200px 80px;text-align:center}
      #cta-logo{width:160px;height:160px;border-radius:999px;background:#e3f0ff;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:60px}
      #cta-logo img{width:128px;height:128px;object-fit:contain}
      #cta-brand{font-family:"Orbitron",sans-serif;font-size:80px;font-weight:800;letter-spacing:0.25em;color:#e3f0ff;text-transform:uppercase;margin-bottom:40px}
      #cta-url{font-family:"Orbitron",sans-serif;font-size:42px;font-weight:700;letter-spacing:0.3em;color:#5eb5f0;text-transform:lowercase}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1080" data-height="1920">

      <div id="stage" class="scene">
        <div class="ripple" id="rp1"></div>
        <div class="ripple" id="rp2"></div>
        <div class="ripple" id="rp3"></div>

        <div class="env-wrap" id="env">
          <div class="env-back"></div>
          <div class="site" id="site">
            <video src="assets/ocean.mp4" muted playsinline></video>
            <div class="site-top">
              <span class="logo"><img src="assets/logo.png" alt="" /></span>
              <span class="brand">Uygundavet</span>
            </div>
            <div class="site-btm">
              <div class="title">Dalga gibi<br>akıcı.</div>
              <div class="go">uygundavet.com</div>
            </div>
          </div>
          <div class="env-front"></div>
          <div class="env-flap-underside"></div>
          <div class="env-flap" id="flap"></div>
          <div class="seal" id="seal">U</div>
        </div>
        <div class="grain"></div>
      </div>

      <div id="cta-wrap">
        <div id="cta-logo"><img src="assets/logo.png" alt="" /></div>
        <div id="cta-brand">Uygundavet</div>
        <div id="cta-url">uygundavet.com</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#stage", { opacity: 0, duration: 0.4, ease: "power2.out" }, 0.05);
      tl.from("#env", { scale: 0.72, opacity: 0, duration: 1.0, ease: "power3.out" }, 0.4);
      tl.from("#seal", { scale: 0, duration: 0.6, ease: "back.out(2.2)" }, 1.05);

      tl.to("#seal", { scale: 1.1, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.9);
      /* Seal drops — triggers ripples */
      tl.to("#seal", { scale: 0.4, y: 60, opacity: 0, duration: 0.5, ease: "power2.in" }, 3.9);

      ["#rp1","#rp2","#rp3"].forEach((r, i) => {
        tl.fromTo(r, { scale: 0.3, opacity: 0.9 },
          { scale: 14, opacity: 0, duration: 2.8, ease: "sine.out" }, 4.0 + i*0.4);
      });

      tl.to("#flap", { rotationX: -170, duration: 1.0, ease: "power3.inOut" }, 4.2);

      tl.to("#site", { opacity: 1, duration: 0.01 }, 5.0);
      tl.to("#site", { y: -560, scale: 1.08, duration: 1.4, ease: "power3.out" }, 5.0);
      tl.to("#site", { y: -640, scale: 1.18, duration: 1.4, ease: "sine.inOut" }, 6.5);
      tl.to("#site", { y: "-=8", duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 1 }, 7.0);

      tl.to([".env-back",".env-front","#flap",".env-flap-underside"], { opacity: 0.2, duration: 0.7, ease: "sine.out" }, 6.6);

      tl.to("#cta-wrap", { opacity: 1, duration: 0.6, ease: "power2.out" }, 9.2);
      tl.from("#cta-logo", { scale: 0, duration: 0.65, ease: "back.out(2)" }, 9.4);
      tl.from("#cta-brand", { y: 30, opacity: 0, duration: 0.65, ease: "power3.out" }, 9.7);
      tl.from("#cta-url", { y: 16, opacity: 0, duration: 0.55, ease: "sine.out" }, 10.0);
      tl.to("#cta-logo", { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.4);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
