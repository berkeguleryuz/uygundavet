<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:1080px;height:1920px;overflow:hidden;
        background:#20110a;font-family:"Space Grotesk",system-ui,sans-serif;color:#ffefd5}
      .scene{position:absolute;inset:0;overflow:hidden}
      .grain{position:absolute;inset:0;pointer-events:none;opacity:0.16;mix-blend-mode:overlay;z-index:60;
        background:radial-gradient(ellipse at 50% 45%,rgba(255,180,80,0.5),transparent 50%),
                   radial-gradient(ellipse at 80% 90%,rgba(200,80,30,0.4),transparent 60%)}
      #stage{background:radial-gradient(ellipse at 50% 40%,#5a2a12 0%,#20110a 75%)}

      .rays{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);width:2600px;height:2600px;z-index:12;opacity:0;pointer-events:none}
      .ray{position:absolute;left:50%;top:50%;transform-origin:center top;
        width:60px;height:1400px;margin-left:-30px;
        background:linear-gradient(180deg,rgba(255,180,70,0.85),transparent 75%);mix-blend-mode:screen}

      .env-wrap{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);
        width:800px;height:520px;perspective:1800px;z-index:20}
      .env-back{position:absolute;inset:0;border-radius:8px;
        background:linear-gradient(180deg,#3a1408,#1c0804);box-shadow:inset 0 20px 40px rgba(0,0,0,0.7);z-index:10}
      .site{position:absolute;left:50%;top:0;width:720px;height:1080px;transform:translate(-50%,50%);
        background:#20110a;border-radius:22px;overflow:hidden;z-index:15;opacity:0;
        box-shadow:0 40px 120px rgba(100,30,5,0.65),0 0 0 1px rgba(255,180,80,0.2)}
      .site video{width:100%;height:100%;object-fit:cover}
      .site .site-top{position:absolute;top:0;left:0;right:0;height:120px;
        background:linear-gradient(180deg,rgba(32,17,10,0.88),rgba(32,17,10,0));
        display:flex;align-items:center;padding:0 40px;z-index:3}
      .site .site-top .logo{width:56px;height:56px;border-radius:999px;background:#ffefd5;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-right:20px}
      .site .site-top .logo img{width:44px;height:44px;object-fit:contain}
      .site .site-top .brand{font-family:"Orbitron",sans-serif;font-size:26px;font-weight:800;letter-spacing:0.3em;color:#ffefd5;text-transform:uppercase}
      .site .site-btm{position:absolute;bottom:0;left:0;right:0;padding:40px;
        background:linear-gradient(0deg,rgba(32,17,10,0.92),rgba(32,17,10,0));
        display:flex;justify-content:space-between;align-items:flex-end;z-index:3}
      .site .site-btm .title{font-family:"Merienda",cursive;font-size:78px;line-height:0.95;color:#ffefd5;max-width:420px}
      .site .site-btm .go{background:#ff9a3f;color:#20110a;padding:18px 30px;border-top-left-radius:16px;
        font-family:"Orbitron",sans-serif;font-weight:800;font-size:22px;letter-spacing:0.25em;text-transform:uppercase}

      .env-front{position:absolute;inset:0;border-radius:8px;z-index:30;
        background:linear-gradient(135deg,#d97a2a,#a53f15 100%);
        box-shadow:0 40px 80px rgba(100,30,5,0.6),inset 0 0 0 2px rgba(255,200,120,0.4);
        clip-path:polygon(0 42%,100% 42%,100% 100%,0 100%)}
      .env-front::after{content:"";position:absolute;left:6%;right:6%;top:50%;bottom:8%;
        border:1.5px solid rgba(255,200,120,0.45);border-radius:4px}
      .env-flap{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#c46520,#8a340f);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;z-index:40;
        box-shadow:0 10px 24px rgba(60,15,0,0.5)}
      .env-flap-underside{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#ffcf80,#ff9a3f);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;
        transform:rotateX(180deg);backface-visibility:hidden;z-index:39}
      .seal{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
        width:104px;height:104px;border-radius:50%;
        background:radial-gradient(circle at 35% 35%,#ffd880,#b66825 75%);
        box-shadow:0 10px 24px rgba(60,15,0,0.5),inset 0 0 25px rgba(110,40,5,0.45);z-index:45;
        display:flex;align-items:center;justify-content:center;
        font-family:"Orbitron",sans-serif;font-size:44px;color:#3a1505;font-weight:800}

      #cta-wrap{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#5a2a12,#20110a 75%);
        opacity:0;z-index:80;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:200px 80px;text-align:center}
      #cta-logo{width:160px;height:160px;border-radius:999px;background:#ffefd5;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:60px}
      #cta-logo img{width:128px;height:128px;object-fit:contain}
      #cta-brand{font-family:"Orbitron",sans-serif;font-size:80px;font-weight:800;letter-spacing:0.25em;color:#ffefd5;text-transform:uppercase;margin-bottom:40px}
      #cta-url{font-family:"Orbitron",sans-serif;font-size:42px;font-weight:700;letter-spacing:0.3em;color:#ff9a3f;text-transform:lowercase}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1080" data-height="1920">

      <div id="stage" class="scene">
        <div class="rays" id="rays">
          <div class="ray" style="transform:rotate(0deg)"></div>
          <div class="ray" style="transform:rotate(24deg)"></div>
          <div class="ray" style="transform:rotate(48deg)"></div>
          <div class="ray" style="transform:rotate(72deg)"></div>
          <div class="ray" style="transform:rotate(96deg)"></div>
          <div class="ray" style="transform:rotate(120deg)"></div>
          <div class="ray" style="transform:rotate(144deg)"></div>
          <div class="ray" style="transform:rotate(168deg)"></div>
          <div class="ray" style="transform:rotate(192deg)"></div>
          <div class="ray" style="transform:rotate(216deg)"></div>
          <div class="ray" style="transform:rotate(240deg)"></div>
          <div class="ray" style="transform:rotate(264deg)"></div>
          <div class="ray" style="transform:rotate(288deg)"></div>
          <div class="ray" style="transform:rotate(312deg)"></div>
          <div class="ray" style="transform:rotate(336deg)"></div>
        </div>

        <div class="env-wrap" id="env">
          <div class="env-back"></div>
          <div class="site" id="site">
            <video src="assets/sunset.mp4" muted playsinline></video>
            <div class="site-top">
              <span class="logo"><img src="assets/logo.png" alt="" /></span>
              <span class="brand">Uygundavet</span>
            </div>
            <div class="site-btm">
              <div class="title">Günün en<br>güzel anı.</div>
              <div class="go">uygundavet.com</div>
            </div>
          </div>
          <div class="env-front"></div>
          <div class="env-flap-underside"></div>
          <div class="env-flap" id="flap"></div>
          <div class="seal" id="seal">U</div>
        </div>
        <div class="grain"></div>
      </div>

      <div id="cta-wrap">
        <div id="cta-logo"><img src="assets/logo.png" alt="" /></div>
        <div id="cta-brand">Uygundavet</div>
        <div id="cta-url">uygundavet.com</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#stage", { opacity: 0, duration: 0.4, ease: "power2.out" }, 0.05);
      tl.from("#env", { scale: 0.65, opacity: 0, rotation: -8, duration: 1.0, ease: "back.out(1.6)" }, 0.4);
      tl.from("#seal", { scale: 0, rotation: 120, duration: 0.6, ease: "back.out(2.2)" }, 1.1);

      tl.to("#env", { rotation: 2, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 1.8);

      tl.to("#seal", { scale: 1.1, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.9);
      tl.to("#seal", { scale: 0, rotation: 200, opacity: 0, duration: 0.4, ease: "back.in(2.2)" }, 3.9);

      /* Rays burst when opening */
      tl.to("#rays", { opacity: 0.9, duration: 0.6, ease: "power2.out" }, 4.1);
      tl.fromTo("#rays", { scale: 0.3, rotation: 0 }, { scale: 1.3, rotation: 60, duration: 2.5, ease: "sine.out" }, 4.1);

      tl.to("#flap", { rotationX: -170, duration: 1.0, ease: "power4.out" }, 4.2);

      tl.to("#site", { opacity: 1, duration: 0.01 }, 5.0);
      tl.to("#site", { y: -560, scale: 1.08, duration: 1.4, ease: "power3.out" }, 5.0);
      tl.to("#site", { y: -640, scale: 1.2, duration: 1.4, ease: "sine.inOut" }, 6.5);

      tl.to("#rays", { opacity: 0.25, scale: 1.7, duration: 3, ease: "sine.out" }, 6.5);
      tl.to([".env-back",".env-front","#flap",".env-flap-underside"], { opacity: 0.18, duration: 0.7, ease: "sine.out" }, 6.6);

      tl.to("#cta-wrap", { opacity: 1, duration: 0.6, ease: "power2.out" }, 9.2);
      tl.from("#cta-logo", { scale: 0, duration: 0.65, ease: "back.out(2)" }, 9.4);
      tl.from("#cta-brand", { y: 30, opacity: 0, duration: 0.65, ease: "power3.out" }, 9.7);
      tl.from("#cta-url", { y: 16, opacity: 0, duration: 0.55, ease: "sine.out" }, 10.0);
      tl.to("#cta-logo", { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.4);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
