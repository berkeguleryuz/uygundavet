<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:1080px;height:1920px;overflow:hidden;
        background:#f5f6f3;font-family:"Space Grotesk",system-ui,sans-serif;color:#252224}
      .scene{position:absolute;inset:0;overflow:hidden}
      #stage{background:#f5f6f3}

      .env-wrap{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);
        width:800px;height:520px;perspective:1800px;z-index:20}
      .env-back{position:absolute;inset:0;border-radius:8px;background:#eceae4;z-index:10;
        box-shadow:inset 0 10px 30px rgba(0,0,0,0.08)}
      .site{position:absolute;left:50%;top:0;width:720px;height:1080px;transform:translate(-50%,50%);
        background:#252224;border-radius:22px;overflow:hidden;z-index:15;opacity:0;
        box-shadow:0 40px 80px rgba(0,0,0,0.2)}
      .site video{width:100%;height:100%;object-fit:cover;opacity:0.88}
      .site .site-top{position:absolute;top:0;left:0;right:0;height:120px;
        background:linear-gradient(180deg,rgba(37,34,36,0.88),rgba(37,34,36,0));
        display:flex;align-items:center;padding:0 40px;z-index:3}
      .site .site-top .logo{width:56px;height:56px;border-radius:999px;background:#f5f6f3;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-right:20px}
      .site .site-top .logo img{width:44px;height:44px;object-fit:contain}
      .site .site-top .brand{font-family:"Orbitron",sans-serif;font-size:26px;font-weight:800;letter-spacing:0.3em;color:#f5f6f3;text-transform:uppercase}
      .site .site-btm{position:absolute;bottom:0;left:0;right:0;padding:40px;
        background:linear-gradient(0deg,rgba(37,34,36,0.92),rgba(37,34,36,0));
        display:flex;justify-content:space-between;align-items:flex-end;z-index:3}
      .site .site-btm .title{font-family:"Merienda",cursive;font-size:78px;line-height:0.95;color:#f5f6f3;max-width:420px}
      .site .site-btm .go{background:#f5f6f3;color:#252224;padding:18px 30px;border-top-left-radius:16px;
        font-family:"Orbitron",sans-serif;font-weight:800;font-size:22px;letter-spacing:0.25em;text-transform:uppercase}

      .env-front{position:absolute;inset:0;border-radius:8px;z-index:30;
        background:#f5f6f3;
        box-shadow:0 30px 60px rgba(0,0,0,0.12),inset 0 0 0 3px #252224;
        clip-path:polygon(0 42%,100% 42%,100% 100%,0 100%)}
      .env-flap{position:absolute;left:0;top:0;width:100%;height:52%;
        background:#f5f6f3;
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;z-index:40;
        box-shadow:0 6px 16px rgba(0,0,0,0.1)}
      .env-flap-edge{position:absolute;left:0;top:0;width:100%;height:52%;z-index:41;pointer-events:none;
        clip-path:polygon(0 0,100% 0,50% 100%);
        background:
          linear-gradient(180deg,transparent 0,transparent calc(100% - 3px),#252224 calc(100% - 3px)),
          linear-gradient(105deg,transparent 49%,#252224 49%,#252224 51%,transparent 51%) no-repeat,
          linear-gradient(255deg,transparent 49%,#252224 49%,#252224 51%,transparent 51%) no-repeat;
        transform-origin:top center}
      /* Thin outline via SVG approach simpler — use border simulation */
      .env-flap{border:3px solid transparent}
      /* Actually use SVG inline for clean outline */
      .env-flap-svg{position:absolute;left:0;top:0;width:100%;height:52%;transform-origin:top center;z-index:40;pointer-events:none}
      .env-flap-svg svg{width:100%;height:100%;overflow:visible}

      .env-flap-underside{position:absolute;left:0;top:0;width:100%;height:52%;
        background:#252224;
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;
        transform:rotateX(180deg);backface-visibility:hidden;z-index:39}
      .seal{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
        width:72px;height:72px;border-radius:50%;background:#252224;z-index:45;
        display:flex;align-items:center;justify-content:center;
        font-family:"Orbitron",sans-serif;font-size:30px;color:#f5f6f3;font-weight:800;letter-spacing:-0.01em}

      /* Top word label */
      .top-txt{position:absolute;top:180px;left:0;right:0;text-align:center;
        font-family:"Orbitron",sans-serif;font-size:32px;font-weight:700;letter-spacing:0.55em;
        color:#555670;text-transform:uppercase;opacity:0;z-index:40}

      #cta-wrap{position:absolute;inset:0;background:#f5f6f3;opacity:0;z-index:80;
        display:flex;flex-direction:column;justify-content:center;align-items:center;padding:200px 80px;text-align:center}
      #cta-logo{width:160px;height:160px;border-radius:999px;background:#252224;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:60px}
      #cta-logo img{width:128px;height:128px;object-fit:contain}
      #cta-brand{font-family:"Orbitron",sans-serif;font-size:80px;font-weight:800;letter-spacing:0.25em;color:#252224;text-transform:uppercase;margin-bottom:40px}
      #cta-url{font-family:"Orbitron",sans-serif;font-size:42px;font-weight:700;letter-spacing:0.3em;color:#555670;text-transform:lowercase}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1080" data-height="1920">

      <div id="stage" class="scene">
        <div class="top-txt" id="top-txt">Uygundavet</div>

        <div class="env-wrap" id="env">
          <div class="env-back"></div>
          <div class="site" id="site">
            <video src="assets/hero.mp4" muted playsinline></video>
            <div class="site-top">
              <span class="logo"><img src="assets/logo.png" alt="" /></span>
              <span class="brand">Uygundavet</span>
            </div>
            <div class="site-btm">
              <div class="title">Sade ve<br>hızlı.</div>
              <div class="go">uygundavet.com</div>
            </div>
          </div>
          <div class="env-front"></div>
          <div class="env-flap-underside"></div>
          <div class="env-flap" id="flap"></div>
          <div class="seal" id="seal">U</div>
        </div>
      </div>

      <div id="cta-wrap">
        <div id="cta-logo"><img src="assets/logo.png" alt="" /></div>
        <div id="cta-brand">Uygundavet</div>
        <div id="cta-url">uygundavet.com</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#stage", { opacity: 0, duration: 0.4, ease: "power2.out" }, 0.05);
      tl.from("#top-txt", { y: -14, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.3);
      tl.to("#top-txt", { opacity: 1, duration: 0.01 }, 0.3);

      tl.from("#env", { scale: 0.8, opacity: 0, duration: 0.9, ease: "power3.out" }, 0.5);
      tl.from("#seal", { scale: 0, duration: 0.55, ease: "back.out(2.2)" }, 1.2);

      tl.to("#seal", { scale: 1.1, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.9);
      tl.to("#seal", { scale: 0, y: 20, opacity: 0, duration: 0.35, ease: "back.in(2)" }, 3.9);

      tl.to("#flap", { rotationX: -170, duration: 1.0, ease: "power3.inOut" }, 4.2);

      tl.to("#site", { opacity: 1, duration: 0.01 }, 5.0);
      tl.to("#site", { y: -560, scale: 1.08, duration: 1.4, ease: "power3.out" }, 5.0);
      tl.to("#site", { y: -640, scale: 1.18, duration: 1.4, ease: "sine.inOut" }, 6.5);

      tl.to(".env-back", { opacity: 0.3, duration: 0.7, ease: "sine.out" }, 6.6);
      tl.to([".env-front","#flap",".env-flap-underside"], { opacity: 0.3, duration: 0.7, ease: "sine.out" }, 6.6);
      tl.to("#top-txt", { opacity: 0, duration: 0.4, ease: "power2.in" }, 6.4);

      tl.to("#cta-wrap", { opacity: 1, duration: 0.6, ease: "power2.out" }, 9.2);
      tl.from("#cta-logo", { scale: 0, duration: 0.65, ease: "back.out(2)" }, 9.4);
      tl.from("#cta-brand", { y: 30, opacity: 0, duration: 0.65, ease: "power3.out" }, 9.7);
      tl.from("#cta-url", { y: 16, opacity: 0, duration: 0.55, ease: "sine.out" }, 10.0);
      tl.to("#cta-logo", { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.4);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
