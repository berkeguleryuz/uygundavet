<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:1080px;height:1920px;overflow:hidden;
        background:#16231a;font-family:"Space Grotesk",system-ui,sans-serif;color:#eaf1e3}
      .scene{position:absolute;inset:0;overflow:hidden}
      .grain{position:absolute;inset:0;pointer-events:none;opacity:0.14;mix-blend-mode:overlay;z-index:60;
        background:radial-gradient(ellipse at 30% 20%,rgba(210,230,190,0.55),transparent 50%),
                   radial-gradient(ellipse at 70% 80%,rgba(85,130,70,0.35),transparent 55%)}
      #stage{background:radial-gradient(ellipse at 50% 40%,#243a28 0%,#16231a 75%)}

      .leaf2{position:absolute;width:38px;height:38px;border-radius:0 100% 0 100%;
        background:linear-gradient(135deg,#b8cb90,#5a7a3a);opacity:0;z-index:16}
      .dot{position:absolute;width:14px;height:14px;border-radius:50%;
        background:radial-gradient(circle,#ffd3c8,#f08a6a);opacity:0;z-index:17;
        box-shadow:0 0 20px rgba(240,140,110,0.55)}

      .env-wrap{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);
        width:800px;height:520px;perspective:1800px;z-index:20}
      .env-back{position:absolute;inset:0;border-radius:8px;
        background:linear-gradient(180deg,#1f3022,#0f1a11);box-shadow:inset 0 20px 40px rgba(0,0,0,0.6);z-index:10}
      .site{position:absolute;left:50%;top:0;width:720px;height:1080px;transform:translate(-50%,50%);
        background:#16231a;border-radius:22px;overflow:hidden;z-index:15;opacity:0;
        box-shadow:0 40px 120px rgba(30,60,30,0.6),0 0 0 1px rgba(190,220,180,0.2)}
      .site video{width:100%;height:100%;object-fit:cover}
      .site .site-top{position:absolute;top:0;left:0;right:0;height:120px;
        background:linear-gradient(180deg,rgba(22,35,26,0.88),rgba(22,35,26,0));
        display:flex;align-items:center;padding:0 40px;z-index:3}
      .site .site-top .logo{width:56px;height:56px;border-radius:999px;background:#eaf1e3;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-right:20px}
      .site .site-top .logo img{width:44px;height:44px;object-fit:contain}
      .site .site-top .brand{font-family:"Orbitron",sans-serif;font-size:26px;font-weight:800;letter-spacing:0.3em;color:#eaf1e3;text-transform:uppercase}
      .site .site-btm{position:absolute;bottom:0;left:0;right:0;padding:40px;
        background:linear-gradient(0deg,rgba(22,35,26,0.92),rgba(22,35,26,0));
        display:flex;justify-content:space-between;align-items:flex-end;z-index:3}
      .site .site-btm .title{font-family:"Merienda",cursive;font-size:78px;line-height:0.95;color:#eaf1e3;max-width:420px}
      .site .site-btm .go{background:#a8cf7a;color:#16231a;padding:18px 30px;border-top-left-radius:16px;
        font-family:"Orbitron",sans-serif;font-weight:800;font-size:22px;letter-spacing:0.25em;text-transform:uppercase}

      .env-front{position:absolute;inset:0;border-radius:8px;z-index:30;
        background:linear-gradient(135deg,#c7d4b0,#97a87c 100%);
        box-shadow:0 40px 80px rgba(30,60,30,0.55),inset 0 0 0 2px rgba(100,140,90,0.35);
        clip-path:polygon(0 42%,100% 42%,100% 100%,0 100%)}
      .env-front::after{content:"";position:absolute;left:6%;right:6%;top:50%;bottom:8%;
        border:1.5px solid rgba(100,140,90,0.45);border-radius:4px}
      .env-flap{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#a8b98c,#7a8d5d);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;z-index:40;
        box-shadow:0 10px 24px rgba(30,60,30,0.4)}
      .env-flap-underside{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#1f3022,#0f1a11);
        clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;
        transform:rotateX(180deg);backface-visibility:hidden;z-index:39}
      .seal{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
        width:104px;height:104px;border-radius:50%;
        background:radial-gradient(circle at 35% 35%,#c6e090,#628f3c 70%);
        box-shadow:0 8px 24px rgba(0,0,0,0.45),inset 0 0 20px rgba(40,70,40,0.5);z-index:45;
        display:flex;align-items:center;justify-content:center;
        font-family:"Orbitron",sans-serif;font-size:44px;color:#0f1a11;font-weight:800}

      #cta-wrap{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#243a28,#16231a 75%);
        opacity:0;z-index:80;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:200px 80px;text-align:center}
      #cta-logo{width:160px;height:160px;border-radius:999px;background:#eaf1e3;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:60px}
      #cta-logo img{width:128px;height:128px;object-fit:contain}
      #cta-brand{font-family:"Orbitron",sans-serif;font-size:80px;font-weight:800;letter-spacing:0.25em;color:#eaf1e3;text-transform:uppercase;margin-bottom:40px}
      #cta-url{font-family:"Orbitron",sans-serif;font-size:42px;font-weight:700;letter-spacing:0.3em;color:#a8cf7a;text-transform:lowercase}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1080" data-height="1920">

      <div id="stage" class="scene">
        <div class="leaf2" id="lf1" style="left:12%;top:-60px"></div>
        <div class="leaf2" id="lf2" style="left:82%;top:-60px"></div>
        <div class="leaf2" id="lf3" style="left:36%;top:-60px"></div>
        <div class="leaf2" id="lf4" style="left:66%;top:-60px"></div>
        <div class="dot" id="d1" style="left:18%;top:40%"></div>
        <div class="dot" id="d2" style="left:80%;top:30%"></div>
        <div class="dot" id="d3" style="left:72%;top:62%"></div>
        <div class="dot" id="d4" style="left:24%;top:68%"></div>

        <div class="env-wrap" id="env">
          <div class="env-back"></div>
          <div class="site" id="site">
            <video src="assets/garden.mp4" muted playsinline></video>
            <div class="site-top">
              <span class="logo"><img src="assets/logo.png" alt="" /></span>
              <span class="brand">Uygundavet</span>
            </div>
            <div class="site-btm">
              <div class="title">Doğada<br>bir söz.</div>
              <div class="go">uygundavet.com</div>
            </div>
          </div>
          <div class="env-front"></div>
          <div class="env-flap-underside"></div>
          <div class="env-flap" id="flap"></div>
          <div class="seal" id="seal">U</div>
        </div>
        <div class="grain"></div>
      </div>

      <div id="cta-wrap">
        <div id="cta-logo"><img src="assets/logo.png" alt="" /></div>
        <div id="cta-brand">Uygundavet</div>
        <div id="cta-url">uygundavet.com</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#stage", { opacity: 0, duration: 0.4, ease: "power2.out" }, 0.05);

      ["#lf1","#lf2","#lf3","#lf4"].forEach((l, i) => {
        tl.fromTo(l, { y: 0, rotation: 0, opacity: 0 },
          { y: 2100, rotation: 540, opacity: 0.85, duration: 7, ease: "sine.inOut" }, 0.2 + i*0.4);
      });

      tl.from("#env", { scale: 0.55, y: 120, opacity: 0, duration: 1.1, ease: "power3.out" }, 0.4);
      tl.from("#seal", { scale: 0, rotation: -90, duration: 0.6, ease: "back.out(2)" }, 1.15);

      /* Floral dots twinkle */
      ["#d1","#d2","#d3","#d4"].forEach((d, i) => {
        tl.fromTo(d, { scale: 0, opacity: 0 },
          { scale: 1.4, opacity: 0.9, duration: 0.8, ease: "sine.out" }, 1.5 + i*0.3);
        tl.to(d, { scale: 0.6, opacity: 0.2, duration: 0.9, ease: "sine.in" }, 2.3 + i*0.3);
        tl.fromTo(d, { scale: 0, opacity: 0 },
          { scale: 1.3, opacity: 0.9, duration: 0.7, ease: "sine.out" }, 6.8 + i*0.3);
        tl.to(d, { scale: 0.6, opacity: 0, duration: 0.8, ease: "sine.in" }, 7.5 + i*0.3);
      });

      tl.to("#seal", { scale: 1.1, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.9);
      tl.to("#seal", { scale: 0, y: 20, opacity: 0, duration: 0.35, ease: "back.in(2)" }, 3.9);

      tl.to("#flap", { rotationX: -170, duration: 1.0, ease: "power3.inOut" }, 4.2);

      tl.to("#site", { opacity: 1, duration: 0.01 }, 5.0);
      tl.to("#site", { y: -560, scale: 1.08, duration: 1.4, ease: "power3.out" }, 5.0);
      tl.to("#site", { y: -640, scale: 1.18, duration: 1.4, ease: "sine.inOut" }, 6.5);

      tl.to([".env-back",".env-front","#flap",".env-flap-underside"], { opacity: 0.2, duration: 0.7, ease: "sine.out" }, 6.6);

      tl.to("#cta-wrap", { opacity: 1, duration: 0.6, ease: "power2.out" }, 9.2);
      tl.from("#cta-logo", { scale: 0, duration: 0.65, ease: "back.out(2)" }, 9.4);
      tl.from("#cta-brand", { y: 30, opacity: 0, duration: 0.65, ease: "power3.out" }, 9.7);
      tl.from("#cta-url", { y: 16, opacity: 0, duration: 0.55, ease: "sine.out" }, 10.0);
      tl.to("#cta-logo", { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.4);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
