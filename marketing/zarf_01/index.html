<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:1080px;height:1920px;overflow:hidden;
        background:#0f1a10;font-family:"Space Grotesk",system-ui,sans-serif;color:#f5f6f3}
      .scene{position:absolute;inset:0;overflow:hidden}
      .grain{position:absolute;inset:0;pointer-events:none;opacity:0.1;mix-blend-mode:overlay;z-index:60;
        background:radial-gradient(ellipse at 30% 20%,rgba(213,209,173,0.5) 0%,rgba(0,0,0,0) 45%),
          radial-gradient(ellipse at 70% 80%,rgba(79,120,60,0.3) 0%,rgba(0,0,0,0) 55%)}

      #stage{background:radial-gradient(ellipse at 50% 40%,#1f3a20 0%,#0f1a10 70%)}

      /* Theme ambient — falling leaves */
      .leaf{position:absolute;width:36px;height:36px;border-radius:0 100% 0 100%;
        background:linear-gradient(135deg,#6ba04a,#3c6a2a);opacity:0;transform-origin:center;z-index:15}

      /* ENVELOPE — physically correct:
         back panel (z:10) → card rises through this → front face (z:30) covers bottom portion → flap (z:40) on top, opens UP/BACK (rotateX negative) */
      .env-wrap{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);
        width:800px;height:520px;perspective:1800px;z-index:20}

      /* Back interior — visible through opening */
      .env-back{position:absolute;inset:0;border-radius:8px;
        background:linear-gradient(180deg,#1a2e1b 0%,#0f1a10 100%);
        box-shadow:inset 0 20px 40px rgba(0,0,0,0.6);z-index:10}

      /* The site card — starts hidden INSIDE the envelope */
      .site{position:absolute;left:50%;top:0;width:720px;height:1080px;
        transform:translate(-50%,50%);
        background:#0f1a10;border-radius:22px;overflow:hidden;
        box-shadow:0 40px 120px rgba(0,0,0,0.7),0 0 0 1px rgba(213,209,173,0.15);
        z-index:15;opacity:0}
      .site video{width:100%;height:100%;object-fit:cover;opacity:0.85}
      .site .site-top{position:absolute;top:0;left:0;right:0;height:120px;
        background:linear-gradient(180deg,rgba(15,26,16,0.88) 0%,rgba(15,26,16,0) 100%);
        display:flex;align-items:center;padding:0 40px;z-index:3}
      .site .site-top .logo{width:56px;height:56px;border-radius:999px;background:#d5d1ad;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-right:20px}
      .site .site-top .logo img{width:44px;height:44px;object-fit:contain}
      .site .site-top .brand{font-family:"Orbitron",sans-serif;font-size:26px;font-weight:800;
        letter-spacing:0.3em;color:#f5f6f3;text-transform:uppercase}
      .site .site-btm{position:absolute;bottom:0;left:0;right:0;padding:40px;
        background:linear-gradient(0deg,rgba(15,26,16,0.92) 0%,rgba(15,26,16,0) 100%);
        display:flex;justify-content:space-between;align-items:flex-end;z-index:3}
      .site .site-btm .title{font-family:"Merienda",cursive;font-size:78px;line-height:0.95;color:#f5f6f3;max-width:420px}
      .site .site-btm .go{background:#d5d1ad;color:#0f1a10;padding:18px 30px;border-top-left-radius:16px;
        font-family:"Orbitron",sans-serif;font-weight:800;font-size:22px;letter-spacing:0.25em;text-transform:uppercase}

      /* Front face — covers lower half of envelope, solid envelope look */
      .env-front{position:absolute;inset:0;border-radius:8px;
        background:linear-gradient(180deg,#d5d1ad 0%,#b8b490 100%);
        box-shadow:0 40px 80px rgba(0,0,0,0.55),inset 0 0 0 2px rgba(79,120,60,0.25);
        z-index:30;
        clip-path:polygon(0 42%,100% 42%,100% 100%,0 100%)}
      .env-front::after{content:"";position:absolute;left:6%;right:6%;top:50%;bottom:8%;
        border:1.5px dashed rgba(79,120,60,0.35);border-radius:4px}

      /* Flap — initially covers upper triangle, opens UP and BACK */
      .env-flap{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#b8b490 0%,#93905f 100%);
        clip-path:polygon(0 0,100% 0,50% 100%);
        transform-origin:top center;transform:rotateX(0deg);z-index:40;
        box-shadow:0 12px 24px rgba(0,0,0,0.3)}
      .env-flap-underside{position:absolute;left:0;top:0;width:100%;height:52%;
        background:linear-gradient(180deg,#2a4a2c 0%,#1a301c 100%);
        clip-path:polygon(0 0,100% 0,50% 100%);
        transform-origin:top center;transform:rotateX(180deg);backface-visibility:hidden;z-index:39}

      /* Seal — U monogram */
      .seal{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
        width:104px;height:104px;border-radius:50%;
        background:radial-gradient(circle at 35% 35%,#8dbf5e,#3f6a2a 75%);
        box-shadow:0 8px 24px rgba(0,0,0,0.5),inset 0 0 20px rgba(20,40,20,0.5);z-index:45;
        display:flex;align-items:center;justify-content:center;
        font-family:"Orbitron",sans-serif;font-size:44px;color:#0f1a10;font-weight:800;letter-spacing:-0.02em}

      /* CTA end state */
      #cta-wrap{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#1f3a20,#0f1a10 70%);
        opacity:0;z-index:80;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:200px 80px;text-align:center}
      #cta-logo{width:160px;height:160px;border-radius:999px;background:#d5d1ad;
        display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:60px}
      #cta-logo img{width:128px;height:128px;object-fit:contain}
      #cta-brand{font-family:"Orbitron",sans-serif;font-size:80px;font-weight:800;letter-spacing:0.25em;
        color:#f5f6f3;text-transform:uppercase;margin-bottom:40px}
      #cta-url{font-family:"Orbitron",sans-serif;font-size:42px;font-weight:700;letter-spacing:0.3em;
        color:#8dbf5e;text-transform:lowercase}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12"
         data-width="1080" data-height="1920">

      <div id="stage" class="scene">
        <div class="leaf" id="l1" style="left:12%;top:-60px"></div>
        <div class="leaf" id="l2" style="left:78%;top:-60px"></div>
        <div class="leaf" id="l3" style="left:32%;top:-60px"></div>
        <div class="leaf" id="l4" style="left:62%;top:-60px"></div>
        <div class="leaf" id="l5" style="left:22%;top:-60px"></div>
        <div class="leaf" id="l6" style="left:86%;top:-60px"></div>

        <div class="env-wrap" id="env">
          <div class="env-back"></div>

          <div class="site" id="site">
            <img src="assets/grow.png" alt="" style="width:100%;height:100%;object-fit:cover" />
            <div class="site-top">
              <span class="logo"><img src="assets/logo.png" alt="" /></span>
              <span class="brand">Uygundavet</span>
            </div>
            <div class="site-btm">
              <div class="title">Düğünün<br>sahnesi.</div>
              <div class="go">uygundavet.com</div>
            </div>
          </div>

          <div class="env-front" id="front"></div>
          <div class="env-flap-underside" id="flap-under"></div>
          <div class="env-flap" id="flap"></div>
          <div class="seal" id="seal">U</div>
        </div>

        <div class="grain"></div>
      </div>

      <div id="cta-wrap">
        <div id="cta-logo"><img src="assets/logo.png" alt="" /></div>
        <div id="cta-brand">Uygundavet</div>
        <div id="cta-url">uygundavet.com</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* Stage in */
      tl.from("#stage", { opacity: 0, duration: 0.4, ease: "power2.out" }, 0.05);

      /* Leaves falling — ambient */
      ["#l1","#l2","#l3","#l4","#l5","#l6"].forEach((l, i) => {
        tl.fromTo(l, { y: 0, rotation: 0, opacity: 0 },
          { y: 2100, rotation: 540, opacity: 0.9, duration: 7, ease: "sine.inOut" }, 0.1 + i*0.32);
      });

      /* Envelope enters */
      tl.from("#env", { scale: 0.7, opacity: 0, duration: 0.9, ease: "back.out(1.6)" }, 0.5);
      tl.from("#seal", { scale: 0, rotation: -180, duration: 0.55, ease: "back.out(2.2)" }, 1.1);

      /* Slight hover */
      tl.to("#env", { y: "-=10", duration: 1.1, ease: "sine.inOut", yoyo: true, repeat: 1 }, 1.6);

      /* Seal pops off */
      tl.to("#seal", { scale: 1.1, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.9);
      tl.to("#seal", { scale: 0, y: 20, opacity: 0, duration: 0.35, ease: "back.in(2)" }, 3.9);

      /* Flap opens UP AND BACK (physically correct) — rotationX negative */
      tl.to("#flap", { rotationX: -170, duration: 1.0, ease: "power3.inOut" }, 4.2);

      /* Site card rises from inside envelope */
      tl.to("#site", { opacity: 1, duration: 0.01 }, 5.0);
      tl.to("#site", {
        y: -560, scale: 1.08,
        duration: 1.4, ease: "power3.out"
      }, 5.0);

      /* Continue to dominate frame */
      tl.to("#site", {
        y: -640, scale: 1.18,
        duration: 1.4, ease: "sine.inOut"
      }, 6.5);

      /* Envelope fades behind */
      tl.to(["#env-back","#front","#flap","#flap-under"], { opacity: 0.18, duration: 0.7, ease: "sine.out" }, 6.6);

      /* CTA end */
      tl.to("#cta-wrap", { opacity: 1, duration: 0.6, ease: "power2.out" }, 9.2);
      tl.from("#cta-logo", { scale: 0, duration: 0.65, ease: "back.out(2)" }, 9.4);
      tl.from("#cta-brand", { y: 30, opacity: 0, duration: 0.65, ease: "power3.out" }, 9.7);
      tl.from("#cta-url", { y: 16, opacity: 0, duration: 0.55, ease: "sine.out" }, 10.0);
      tl.to("#cta-logo", { scale: 1.04, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 10.4);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
